{% extends 'base.html' %}
{% block title %}Masuk — SpeakUp{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🎤</div>
            <h1>Selamat Datang!</h1>
            <p>Masuk ke akun SpeakUp kamu</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukkan username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
            </div>
            <div class="form-check">
                <label>
                    <input type="checkbox" name="remember"> Ingat saya
                </label>
            </div>
            <button type="submit" class="btn-auth">Masuk 🚀</button>
        </form>

        <div class="social-login">
            <a href="{{ url_for('auth.google_login') }}" class="btn-google">
                <img src="/static/google-icon.svg" alt="Google"> Masuk dengan Google
            </a>
        </div>

        <div class="auth-footer">
            Belum punya akun? <a href="{{ url_for('auth.register') }}">Daftar sekarang</a>
        </div>
    </div>
</div>

<style>
.btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #fff;
    border: 1px solid #ddd;
    padding: 0.5rem 1rem;
    text-decoration: none;
    color: #444;
    border-radius: 4px;
    margin-top: 1rem;
}
.btn-google img {
    width: 20px;
    margin-right: 0.5rem;
}
</style>

{% endblock %}
