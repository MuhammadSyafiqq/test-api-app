{% extends 'base.html' %}
{% block title %}Daftar — SpeakUp{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h1>Buat Akun Baru</h1>
            <p>Mulai perjalanan latihan public speaking kamu</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Pilih username unikmu" required minlength="3">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@contoh.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Minimal 6 karakter" required minlength="6">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" name="confirm_password" placeholder="Ulangi password" required>
            </div>

            <button type="submit" class="btn-auth">Daftar Sekarang 🎉</button>
        </form>

        <div class="social-login">
            <a href="{{ url_for('auth.google_login') }}" class="btn-google">
                <img src="/static/google-icon.svg" alt="Google"> Daftar dengan Google
            </a>
        </div>

        <div class="auth-footer">
            Sudah punya akun? <a href="{{ url_for('auth.login') }}">Masuk di sini</a>
        </div>
    </div>
</div>

<style>
.btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #fff;
    border: 1px solid #ddd;
    padding: 0.5rem 1rem;
    text-decoration: none;
    color: #444;
    border-radius: 4px;
    margin-top: 1rem;
}
.btn-google img {
    width: 20px;
    margin-right: 0.5rem;
}
</style>

{% endblock %}
